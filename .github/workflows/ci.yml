name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint --filter=@snowmind/web

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: lint-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build --filter=@snowmind/web
        env:
          NEXT_PUBLIC_PRIVY_APP_ID: "stub-privy-id"
          NEXT_PUBLIC_ZERODEV_PROJECT_ID: "stub-zerodev-id"
          NEXT_PUBLIC_AVALANCHE_RPC_URL: "https://api.avax-test.network/ext/bc/C/rpc"
          NEXT_PUBLIC_BACKEND_URL: "https://stub-backend.railway.app"
          NEXT_PUBLIC_CHAIN_ID: "43113"

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: uv sync
      - run: uv run pytest tests/ -v --tb=short
