name: Security - FirePan

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read
  security-events: write

jobs:
  firepan-scan:
    name: FirePan Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate FirePan API key secret
        shell: bash
        env:
          FIREPAN_API_KEY: ${{ secrets.FIREPAN_API_KEY }}
        run: |
          if [ -z "$FIREPAN_API_KEY" ]; then
            echo "::error::FIREPAN_API_KEY is not configured. Add repository secret FIREPAN_API_KEY to enforce FirePan checks."
            exit 1
          fi

      - name: Run FirePan scan
        uses: firepan-labs/security-action@v1
        with:
          fail-on: high
          path: contracts/
          format: sarif
          output: firepan-results.sarif
        env:
          FIREPAN_API_KEY: ${{ secrets.FIREPAN_API_KEY }}

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: firepan-results.sarif
